<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Chấm Bài Tiếng Anh</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #2563eb; --blue-bg: #eff6ff; --green: #16a34a; --green-bg: #f0fdf4;
    --red: #dc2626; --red-bg: #fef2f2; --gray: #6b7280; --border: #e5e7eb;
    --bg: #f9fafb; --card: #ffffff; --text: #111827;
  }
  body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); }
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 180px; background: var(--card); border-right: 1px solid var(--border); padding: 1rem 0; }
  .brand { padding: 0 16px 1rem; font-weight: 600; font-size: 15px; color: var(--blue); }
  .tab-btn { display: block; width: 100%; padding: 11px 16px; text-align: left; border: none; background: transparent; color: var(--gray); cursor: pointer; font-size: 14px; }
  .tab-btn:hover { background: var(--bg); }
  .tab-btn.active { color: var(--blue); background: var(--blue-bg); border-left: 3px solid var(--blue); padding-left: 13px; font-weight: 500; }
  .main { flex: 1; padding: 2rem; overflow-y: auto; }
  h2 { font-size: 18px; font-weight: 600; margin-bottom: 1.5rem; }
  .panel { display: none; } .panel.active { display: block; }
  .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--gray); text-transform: uppercase; margin-bottom: 1rem; letter-spacing: 0.04em; }
  label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  input[type=text], input[type=file], select { display: block; width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; margin-bottom: 1rem; }
  input:focus, select:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-bg); }
  .btn { padding: 9px 16px; border: 1px solid var(--border); background: var(--card); border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit; }
  .btn:hover { background: var(--bg); }
  .btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn.success { background: var(--green); color: #fff; border-color: var(--green); }
  .btn.danger { background: var(--red-bg); color: var(--red); border-color: #fecaca; }
  .msg { padding: 0.9rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 14px; }
  .msg.success { background: var(--green-bg); color: var(--green); }
  .msg.error { background: var(--red-bg); color: var(--red); }
  .msg.info { background: var(--blue-bg); color: var(--blue); }
  .answer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px,1fr)); gap: 8px; margin-bottom: 1rem; }
  .answer-cell { display: flex; align-items: center; gap: 4px; background: var(--bg); padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border); }
  .answer-cell .qnum { font-size: 12px; color: var(--gray); min-width: 22px; }
  .answer-cell select { margin: 0; padding: 2px; font-size: 13px; border: none; background: transparent; width: auto; }
  .result-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; max-height: 400px; overflow-y: auto; }
  .answer-row { display: flex; gap: 1rem; margin-bottom: 0.5rem; font-size: 13px; align-items: center; }
  .answer-num { font-weight: 600; min-width: 36px; color: var(--gray); }
  .answer-std { color: var(--green); min-width: 80px; }
  .match { color: var(--green); } .mismatch { color: var(--red); }
  .button-group { display: flex; gap: 1rem; margin-top: 1.5rem; }
  .button-group .btn { flex: 1; }
  .thumb { display: inline-block; width: 64px; height: 64px; object-fit: cover; border-radius: 6px; margin: 4px; border: 1px solid var(--border); }
  .score-big { text-align: center; padding: 1.25rem; background: var(--blue-bg); border-radius: 8px; color: var(--blue); margin-top: 1rem; font-size: 18px; font-weight: 600; }
  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; display: flex; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--border); padding: 0; }
    .brand { width: 100%; padding: 12px 16px 8px; }
    .tab-btn { flex: 1; text-align: center; }
    .tab-btn.active { border-left: none; border-bottom: 3px solid var(--blue); padding-left: 16px; }
    .main { padding: 1rem; }
    .button-group { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">🎯 Chấm Bài</div>
    <button class="tab-btn active" onclick="switchTab('create',event)">+ Tạo đề</button>
    <button class="tab-btn" onclick="switchTab('list',event)">≡ Đề đã lưu</button>
    <button class="tab-btn" onclick="switchTab('grade',event)">☑ Chấm bài</button>
  </div>
  <div class="main">
    <div id="create" class="panel active">
      <h2>Tạo đề mới — chụp bảng đáp án</h2>
      <div id="msg-create"></div>
      <div class="section">
        <div class="section-title">Bước 1: Thông tin</div>
        <label>Tên đề</label>
        <input type="text" id="testName" placeholder="VD: Tuyển sinh 10 - Mã đề 015">
      </div>
      <div class="section">
        <div class="section-title">Bước 2: Chụp ảnh bảng đáp án</div>
        <label>Ảnh bảng đáp án (dạng ô: 1.D 2.B 3.A ...)</label>
        <input type="file" id="keyImage" accept="image/*" onchange="previewKey()">
        <img id="keyPreview" class="thumb" style="display:none;">
        <button class="btn primary" onclick="readAnswerKey()" style="width:100%;margin-top:0.5rem;">🔍 Đọc bảng đáp án</button>
      </div>
      <div class="section" id="reviewSection" style="display:none;">
        <div class="section-title">Bước 3: Kiểm tra & sửa (nếu cần)</div>
        <div id="answerGrid" class="answer-grid"></div>
        <button class="btn success" onclick="saveTest()" style="width:100%;">💾 Lưu đề</button>
      </div>
    </div>
    <div id="list" class="panel">
      <h2>Danh sách đề đã lưu</h2>
      <div id="testList"></div>
    </div>
    <div id="grade" class="panel">
      <h2>Chấm bài học sinh</h2>
      <div id="msg-grade"></div>
      <div class="section">
        <div class="section-title">Bước 1: Chọn đề</div>
        <select id="gradeTestId"><option value="">-- Chọn đề --</option></select>
      </div>
      <div class="section">
        <div class="section-title">Bước 2: Upload ảnh bài làm (nhiều trang)</div>
        <label>Chọn tất cả ảnh các trang đề HS đã khoanh</label>
        <input type="file" id="gradeImages" accept="image/*" multiple onchange="previewGrade()">
        <div id="gradePreview"></div>
        <button class="btn primary" onclick="gradeStudent()" style="width:100%;margin-top:0.5rem;">📋 Chấm bài</button>
      </div>
      <div id="gradeResult"></div>
    </div>
  </div>
</div>
<script>
  const API_URL = '/api/gemini';
  const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyl88kbn9RRxxNo2yEFAinRgVfMcqVseIUNTsp8ugHYOQ0XLOBTtwcmCag8zFIVFUSl/exec';
  let detectedAnswers = {};
  let currentGrade = null;

  // ----- localStorage helpers -----
  function getTests() { try { return JSON.parse(localStorage.getItem('chambai_tests') || '{}'); } catch { return {}; } }
  function saveTests(t) { localStorage.setItem('chambai_tests', JSON.stringify(t)); }

  function switchTab(tab, ev) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    ev.target.closest('.tab-btn').classList.add('active');
    if (tab === 'list') loadTestList();
    if (tab === 'grade') loadTestsForGrade();
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result.split(',')[1]);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  function previewKey() {
    const f = document.getElementById('keyImage').files[0];
    if (f) { const img = document.getElementById('keyPreview'); img.src = URL.createObjectURL(f); img.style.display = 'inline-block'; }
  }

  async function readAnswerKey() {
    const f = document.getElementById('keyImage').files[0];
    if (!f) { showMsg('create', '❌ Chọn ảnh bảng đáp án trước', 'error'); return; }
    showMsg('create', '⏳ Gemini đang đọc bảng đáp án...', 'info');
    try {
      const base64 = await fileToBase64(f);
      const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ images:[base64], mode:'answerkey' }) });
      const data = await res.json();
      if (data.error) { showMsg('create', '❌ '+data.error, 'error'); return; }
      detectedAnswers = data.answers || {};
      renderAnswerGrid();
      document.getElementById('reviewSection').style.display = 'block';
      showMsg('create', `✅ Đọc được ${Object.keys(detectedAnswers).length} câu. Kiểm tra lại bên dưới.`, 'success');
    } catch (e) { showMsg('create', '❌ Lỗi: '+e.message, 'error'); }
  }

  function renderAnswerGrid() {
    const nums = Object.keys(detectedAnswers).map(Number).sort((a,b)=>a-b);
    let html = '';
    for (const n of nums) {
      const v = detectedAnswers[n];
      html += `<div class="answer-cell"><span class="qnum">${n}.</span><select onchange="detectedAnswers[${n}]=this.value">${['A','B','C','D'].map(L=>`<option value="${L}" ${v===L?'selected':''}>${L}</option>`).join('')}</select></div>`;
    }
    document.getElementById('answerGrid').innerHTML = html;
  }

  function saveTest() {
    const name = document.getElementById('testName').value.trim();
    if (!name) { showMsg('create','❌ Nhập tên đề','error'); return; }
    if (Object.keys(detectedAnswers).length===0) { showMsg('create','❌ Chưa có đáp án','error'); return; }
    const tests = getTests();
    const id = Date.now().toString();
    tests[id] = { id, name, answers: detectedAnswers, createdAt: new Date().toLocaleString('vi-VN') };
    saveTests(tests);
    showMsg('create', `✅ Đã lưu đề "${name}" (${Object.keys(detectedAnswers).length} câu)`, 'success');
    setTimeout(() => {
      document.getElementById('testName').value='';
      document.getElementById('reviewSection').style.display='none';
      document.getElementById('keyPreview').style.display='none';
      document.getElementById('keyImage').value='';
      detectedAnswers = {};
    }, 1500);
  }

  function loadTestList() {
    const tests = getTests();
    const ids = Object.keys(tests);
    if (ids.length===0) { document.getElementById('testList').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--gray);">Chưa có đề nào</div>'; return; }
    let html = '';
    for (const id of ids) {
      const t = tests[id];
      const c = Object.keys(t.answers||{}).length;
      html += `<div class="section"><div style="display:flex;justify-content:space-between;align-items:start;"><div><h3 style="margin:0 0 0.5rem;font-size:16px;">${t.name}</h3><p style="margin:0;font-size:12px;color:var(--gray);">${c} câu · ${t.createdAt}</p></div><button class="btn danger" onclick="deleteTest('${id}')">Xóa</button></div></div>`;
    }
    document.getElementById('testList').innerHTML = html;
  }

  function loadTestsForGrade() {
    const tests = getTests();
    let opts = '<option value="">-- Chọn đề --</option>';
    for (const id of Object.keys(tests)) opts += `<option value="${id}">${tests[id].name}</option>`;
    document.getElementById('gradeTestId').innerHTML = opts;
  }

  function previewGrade() {
    const files = document.getElementById('gradeImages').files;
    let html = '';
    for (const f of files) html += `<img class="thumb" src="${URL.createObjectURL(f)}">`;
    document.getElementById('gradePreview').innerHTML = html;
  }

  async function gradeStudent() {
    const id = document.getElementById('gradeTestId').value;
    const files = document.getElementById('gradeImages').files;
    if (!id) { showMsg('grade','❌ Chọn đề','error'); return; }
    if (files.length===0) { showMsg('grade','❌ Chọn ảnh bài làm','error'); return; }
    document.getElementById('gradeResult').innerHTML = '';
    const test = getTests()[id];
    const allAnswers = {};
    for (let i = 0; i < files.length; i++) {
      showMsg('grade', `⏳ Đang đọc ảnh ${i+1}/${files.length}...`, 'info');
      try {
        const base64 = await fileToBase64(files[i]);
        const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ images:[base64], mode:'grading' }) });
        const data = await res.json();
        if (data.error) { showMsg('grade','❌ Ảnh '+(i+1)+': '+data.error,'error'); return; }
        Object.assign(allAnswers, data.answers || {});
      } catch (e) { showMsg('grade','❌ Lỗi ảnh '+(i+1)+': '+e.message,'error'); return; }
      if (i < files.length - 1) await new Promise(r => setTimeout(r, 1500));
    }
    showMsg('grade','✅ Chấm xong!','success');
    currentGrade = { test, studentAnswers: allAnswers };
    displayGrade(test, allAnswers);
  }

  function displayGrade(test, sa) {
    const nums = Object.keys(test.answers).map(Number).sort((a,b)=>a-b);
    let dung = [], sai = [], khongRo = [];
    for (const n of nums) {
      const c = test.answers[n], s = sa[n] || '?';
      if (s === '?') khongRo.push(n);
      else if (s === c) dung.push(n);
      else sai.push(n);
    }
    const total = nums.length;
    const diem = (dung.length / total * 10).toFixed(2);

    let html = `<div class="score-big" style="margin-bottom:1rem;">
      <div style="font-size:28px;font-weight:700;margin-bottom:0.5rem;">${diem} / 10</div>
      <div style="font-size:14px;display:flex;justify-content:center;gap:1.5rem;margin-top:0.5rem;">
        <span style="color:var(--green);">✓ Đúng: ${dung.length}</span>
        <span style="color:var(--red);">✗ Sai: ${sai.length}</span>
        ${khongRo.length ? `<span style="color:var(--gray);">? Không rõ: ${khongRo.length}</span>` : ''}
      </div>
    </div>`;

    if (sai.length) {
      html += `<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:0.75rem 1rem;margin-bottom:1rem;font-size:13px;color:var(--red);">
        <b>Câu sai:</b> ${sai.join(', ')}
      </div>`;
    }

    html += '<div class="result-card">';
    for (const n of nums) {
      const c = test.answers[n], s = sa[n] || '?';
      const status = s === '?' ? 'unknown' : s === c ? 'match' : 'mismatch';
      const icon = s === '?' ? '?' : s === c ? '✓' : '✗';
      const color = s === '?' ? 'var(--gray)' : s === c ? 'var(--green)' : 'var(--red)';
      html += `<div class="answer-row">
        <div class="answer-num">${n}.</div>
        <div class="answer-std">Đáp án: <b>${c}</b></div>
        <div style="color:${color};min-width:80px;">HS: <b>${s}</b></div>
        <div style="color:${color};font-weight:600;">${icon}</div>
      </div>`;
    }
    html += '</div>';
    html += `<div class="button-group"><button class="btn success" onclick="saveToSheets()">💾 Lưu vào Google Sheets</button><button class="btn" onclick="resetGrade()">Chấm bài khác</button></div>`;
    document.getElementById('gradeResult').innerHTML = html;
  }

  async function saveToSheets() {
    if (!currentGrade) return;
    const { test, studentAnswers } = currentGrade;
    const nums = Object.keys(test.answers).map(Number).sort((a,b)=>a-b);
    let score = 0;
    for (const n of nums) if ((studentAnswers[n]||'')===test.answers[n]) score++;
    try {
      const payload = { testName: test.name, studentAnswers, standardAnswers: test.answers, score, total: nums.length };
      const res = await fetch(SHEETS_URL, { method:'POST', body: JSON.stringify(payload) });
      const r = await res.json();
      if (r.success) showMsg('grade','✅ Đã lưu vào Google Sheets!','success');
      else showMsg('grade','❌ '+r.error,'error');
    } catch (e) { showMsg('grade','❌ Lỗi: '+e.message,'error'); }
  }

  function resetGrade() {
    document.getElementById('gradeImages').value='';
    document.getElementById('gradePreview').innerHTML='';
    document.getElementById('gradeResult').innerHTML='';
    currentGrade = null;
  }

  function deleteTest(id) {
    const tests = getTests();
    delete tests[id];
    saveTests(tests);
    showMsg('list','✅ Đã xóa','success');
    setTimeout(loadTestList, 600);
  }

  function showMsg(panel, text, type) {
    const m = document.getElementById('msg-'+panel);
    if (m) { m.innerHTML = `<div class="msg ${type}">${text}</div>`; if(type==='success') setTimeout(()=>m.innerHTML='', 4000); }
  }
</script>
</body>
</html>
